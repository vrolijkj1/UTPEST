input,select,textarea,button{font-family:inherit;font-size:inherit}

.svc-btn:hover,.svc-btn:active{border-color:#4DA6E8}
.sel-row{display:flex;align-items:center;gap:5px;background:#0a0a0a;border-radius:4px;padding:4px 7px;margin-bottom:2px}
.mini-inp{padding:2px 5px;background:#1a1a1a;border:1px solid #252525;border-radius:3px;color:#ccc;font-size:10px;text-align:right;outline:none;width:40px}

.icon-btn{background:none;border:none;cursor:pointer;padding:2px;display:inline-flex;align-items:center}
.tab-btn{padding:7px 12px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid #252525;background:transparent;color:#888;font-family:'Source Sans Pro',sans-serif}
.tab-btn.active{border-color:#4DA6E8;background:rgba(77,166,232,0.09);color:#fff}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:30px 12px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal{background:#1a1a1a;border:1px solid #252525;border-radius:14px;padding:20px;max-width:540px;width:100%}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.main{max-width:1080px;margin:0 auto;padding:14px 10px 60px}
.est-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}

.oh-row{display:flex;align-items:center;gap:5px;padding:3px 6px;background:#0a0a0a;border-radius:4px;margin-bottom:2px}

/* ═══ PERSISTENCE ═══ */
function loadConfig(){
  try{
    var raw=localStorage.getItem("utp-config");
    if(raw){
      var cfg=JSON.parse(raw);
      if(cfg.overhead)S.overhead=cfg.overhead;
      if(cfg.catalog)S.catalog=cfg.catalog;
      if(cfg.billHrs!==undefined)S.billHrs=cfg.billHrs;
      if(cfg.labMark!==undefined)S.labMark=cfg.labMark;
      if(cfg.eqMark!==undefined)S.eqMark=cfg.eqMark;
      if(cfg.labDisp)S.labDisp=cfg.labDisp;
      if(cfg.memberDisc!==undefined)S.memberDisc=cfg.memberDisc;
    }
  }catch(e){}
}
var _saveTimer=null;
function saveConfig(){
  clearTimeout(_saveTimer);
  S.saveStatus="saving";render();
  _saveTimer=setTimeout(function(){
    try{
      localStorage.setItem("utp-config",JSON.stringify({
        overhead:S.overhead,catalog:S.catalog,billHrs:S.billHrs,
        labMark:S.labMark,eqMark:S.eqMark,labDisp:S.labDisp,memberDisc:S.memberDisc,savedAt:new Date().toISOString()
      }));
      S.saveStatus="saved";render();
      setTimeout(function(){S.saveStatus="";render()},2000);
    }catch(e){S.saveStatus="error";render();setTimeout(function(){S.saveStatus="";render()},3000)}
  },800);
}

function exportConfig(){
  var cfg={version:"3.1",exportedAt:new Date().toISOString(),overhead:S.overhead,catalog:S.catalog,billHrs:S.billHrs,labMark:S.labMark,eqMark:S.eqMark,labDisp:S.labDisp,memberDisc:S.memberDisc};

/* ═══ DERIVED ═══ */
function calcTotalOH(){return S.overhead.reduce(function(s,i){return s+(parseFloat(i.annual)||0)},0)}
function calcBurden(){return S.billHrs>0?calcTotalOH()/S.billHrs:0}
function calcLabRate(){return calcBurden()*(1+S.labMark/100)}
function calcPriced(){
  var b=calcBurden(),lm=S.labMark/100,em=S.eqMark/100;
  var totMin=S.selSvc.reduce(function(s,v){return s+(parseInt(v.jobTime)||0)},0);
  var totLabPrice=(totMin/60)*b*(1+lm);
  return S.selSvc.map(function(svc){
    var mins=parseInt(svc.jobTime)||0;
    var ep=(parseFloat(svc.equipCost)||0)*(1+em);
    var ls=totMin>0?(mins/totMin)*totLabPrice:0;
    return Object.assign({},svc,{ep:ep,ls:ls,tp:ep+ls});
  });
}
function calcTots(){
  var p=calcPriced();
  var lO=p.reduce(function(s,x){return s+x.ls},0);
  var eO=p.reduce(function(s,x){return s+x.ep},0);
  var pT=S.passCosts.reduce(function(s,x){return s+(parseFloat(x.cost)||0)},0);
  var sub=lO+eO+pT;var disc=S.isMember?(sub*S.memberDisc/100):0;
  return{lO:lO,eO:eO,pT:pT,sub:sub,disc:disc,gT:sub-disc};
}
function calcCostBasis(){
  var p=calcPriced(),b=calcBurden(),t=calcTots();
  var lc=p.reduce(function(s,x){return s+((parseInt(x.jobTime)||0)/60)*b},0);
  var ec=p.reduce(function(s,x){return s+(parseFloat(x.equipCost)||0)},0);
  return lc+ec+t.pT;
}
function getFilteredCatalog(){
  var q=S.search.toLowerCase();
  return S.catalog.filter(function(s){
    var ms=!q||s.desc.toLowerCase().indexOf(q)>=0||s.code.toLowerCase().indexOf(q)>=0;
    var ml=S.lvlFilt==="All"||s.level===S.lvlFilt;
    return ms&&ml;
  });
}
function getLevels(){var s=new Set();S.catalog.forEach(function(c){s.add(c.level)});return Array.from(s)}
